<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Premium Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #ffffff; }
        .font-logo { font-family: 'Archivo Black', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Logo = () => (
            <div className="flex flex-col items-center">
                {/* Logo principal buscando do seu repositório */}
                <img src="115323.png" alt="MP MODAS LOGO" className="w-20 h-20 object-contain" onError={(e) => {e.target.src="https://via.placeholder.com/150?text=MP+MODAS"}} />
                <span className="font-logo text-[10px] tracking-[0.3em] mt-2 text-black uppercase">Qualidade Premium</span>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940?text=Olá!%20Tenho%20interesse%20neste%20produto%20do%20catálogo.";
            
            const products = [
                { name: "Camisa Flamengo Oficial 24/25", tag: "Brasil", image: "https://images.unsplash.com/photo-1620311210427-046645398695?w=600" },
                { name: "Camisa Palmeiras Puma Home", tag: "Brasil", image: "https://images.unsplash.com/photo-1551958219-acbc608c6377?w=600" },
                { name: "Nike Dunk Low Retro Panda", tag: "Casual", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600" },
                { name: "Camisa São Paulo New Balance", tag: "Brasil", image: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=600" },
                { name: "Nike Air Jordan 1 Low Grey", tag: "Streetwear", image: "https://images.unsplash.com/photo-1584000302558-ce0ba46d23f7?w=600" },
                { name: "Camisa Corinthians Nike Black", tag: "Brasil", image: "https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=600" },
                { name: "Adidas Forum Low White", tag: "Casual", image: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=600" },
                { name: "Yeezy Boost 350 V2 Onyx", tag: "Hype", image: "https://images.unsplash.com/photo-1605348532760-6753d2c43329?w=600" },
            ];

            return (
                <div className="min-h-screen">
                    <header className="fixed top-0 w-full z-50 bg-white border-b border-zinc-100 py-4">
                        <div className="max-w-7xl mx-auto px-6 flex justify-center">
                            <Logo />
                        </div>
                    </header>

                    <main className="pt-44 pb-20 px-6 max-w-7xl mx-auto">
                        <div className="mb-12 border-l-4 border-black pl-4">
                            <h2 className="text-3xl font-black uppercase tracking-tighter">Coleção Atual</h2>
                            <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest">Streetwear & Times Nacionais</p>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                            {products.map((p, i) => (
                                <div key={i} className="group flex flex-col h-full">
                                    <div className="aspect-[4/5] overflow-hidden bg-zinc-100 rounded-xl relative mb-4 shadow-sm group-hover:shadow-md transition">
                                        <div className="absolute top-3 left-3 z-10 bg-black text-white text-[9px] font-black px-2 py-1 uppercase tracking-tighter">
                                            {p.tag}
                                        </div>
                                        <img src={p.image} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
                                    </div>
                                    <div className="flex flex-col flex-grow px-1 text-center">
                                        <h3 className="font-bold text-[11px] md:text-xs uppercase tracking-tight text-zinc-900 mb-4 line-clamp-2 leading-tight">
                                            {p.name}
                                        </h3>
                                        <a href={whatsapp} target="_blank" className="mt-auto block w-full border-2 border-black text-black py-2 text-[10px] font-black uppercase tracking-widest hover:bg-black hover:text-white transition rounded-lg">
                                            Consultar Disponibilidade
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="bg-zinc-50 border-t border-zinc-100 py-12 text-center">
                        <p className="text-zinc-400 text-[9px] font-bold uppercase tracking-[0.4em]">MP MODAS - Petrópolis/RJ</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
