<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Premium Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .font-title { font-family: 'Syncopate', sans-serif; }
        .product-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #111; }
        .product-card:hover { border-color: #fff; transform: translateY(-10px); }
        .glitch-text { text-shadow: 2px 0 #ff0000, -2px 0 #00ff00; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Logo = () => (
            <div className="flex flex-col items-center">
                <div className="w-16 h-16 bg-white flex items-center justify-center rounded-none mb-2 shadow-[4px_4px_0px_0px_rgba(255,255,255,0.2)]">
                    <span className="text-black font-black text-2xl tracking-tighter">MP</span>
                </div>
                <span className="text-[10px] font-bold tracking-[0.6em] uppercase text-white">Modas Atelier</span>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940?text=Vim%20pelo%20site!%20Tenho%20interesse%20em%20peças%20Premium.";
            
            const catalog = [
                { cat: "CASACU / HYPE", name: "Corta-Vento Nike Tech Reflective", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800&q=80" },
                { cat: "TÊNIS / JORDAN", name: "Air Jordan 1 Retro 'High OG'", img: "https://images.unsplash.com/photo-1597041066858-1320499092d0?w=800&q=80" },
                { cat: "CAMISA / LUXO", name: "Jersey Premium Black Edition", img: "https://images.unsplash.com/photo-1562157873-818bc0726f68?w=800&q=80" },
                { cat: "TÊNIS / AIR MAX", name: "Nike Air Max 97 'Silver Bullet'", img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=800&q=80" },
                { cat: "CASACU / WINTER", name: "Puffer Jacket North Series", img: "https://images.unsplash.com/photo-1544923246-77307dd654ca?w=800&q=80" },
                { cat: "CAMISA / STREET", name: "Oversized Heavy Cotton 'MP'", img: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800&q=80" },
                { cat: "TÊNIS / CASUAL", name: "Adidas Forum Low Exhibit", img: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=800&q=80" },
                { cat: "ACESSÓRIO", name: "Shoulder Bag Street Black", img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=800&q=80" }
            ];

            return (
                <div className="min-h-screen">
                    {/* NAVBAR DARK LUXURY */}
                    <nav className="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-zinc-800 py-6">
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="w-8 h-8 bg-white flex items-center justify-center">
                                    <span className="text-black text-[10px] font-black underline">MP</span>
                                </div>
                            </div>
                            <Logo />
                            <a href={whatsapp} className="text-[10px] font-black border border-white px-4 py-2 hover:bg-white hover:text-black transition uppercase tracking-widest">Contato</a>
                        </div>
                    </nav>

                    {/* HERO SECTION - CHAMA ATENÇÃO */}
                    <header className="pt-56 pb-20 px-6 text-center">
                        <h2 className="text-[10px] font-black tracking-[0.8em] text-zinc-500 uppercase mb-6 italic">Petrópolis Heavy Streetwear</h2>
                        <h1 className="font-title text-5xl md:text-8xl tracking-tighter mb-10 leading-none italic uppercase">
                            NOVA<br/><span className="text-zinc-800 outline-text">ERA.</span>
                        </h1>
                        <div className="w-full h-[1px] bg-zinc-800 max-w-xs mx-auto mb-10"></div>
                    </header>

                    {/* CATALOGO DINAMICO */}
                    <main className="max-w-7xl mx-auto px-6 pb-40">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {catalog.map((item, i) => (
                                <div key={i} className="product-card bg-zinc-950 p-3 group">
                                    <div className="aspect-square overflow-hidden mb-6 bg-zinc-900 grayscale group-hover:grayscale-0 transition-all duration-700">
                                        <img src={item.img} alt={item.name} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" />
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="text-[8px] font-black tracking-widest text-zinc-600 uppercase mb-1 underline decoration-zinc-800 underline-offset-4">{item.cat}</span>
                                        <h3 className="text-[11px] font-bold uppercase tracking-tight text-white mb-6 h-10 leading-tight">{item.name}</h3>
                                        <a href={whatsapp} target="_blank" className="bg-white text-black text-center py-3 text-[9px] font-black uppercase tracking-widest hover:bg-zinc-200 transition">
                                            RESERVAR PEÇA
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-zinc-950 border-t border-zinc-900 py-20 px-6 text-center">
                        <p className="text-zinc-700 text-[9px] font-bold tracking-[0.8em] uppercase mb-4 italic">MP MODAS • EXCLUSIVIDADE ABSOLUTA</p>
                        <p className="text-zinc-800 text-[8px] uppercase">© 2026 Crafted in Petrópolis</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
