<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
        
        .video-background {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -100;
            filter: brightness(0.4) contrast(1.2);
            object-fit: cover;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .font-title { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: -2px; }
        
        .btn-premium {
            background: #fff;
            color: #000;
            transition: all 0.3s ease;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-premium:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-background">
        <source src="https://cdn.pixabay.com/video/2021/04/12/70817-537463690_tiny.mp4" type="video/mp4">
    </video>

    <div class="relative z-10 h-screen flex flex-col items-center justify-between py-12 px-6">
        
        <div className="flex flex-col items-center">
            <div class="w-20 h-20 bg-white flex items-center justify-center mb-4 shadow-2xl">
                <span class="text-black font-black text-3xl">MP</span>
            </div>
            <p class="text-white text-[10px] tracking-[0.8em] uppercase font-bold">Modas Atelier</p>
        </div>

        <div class="text-center">
            <h1 class="font-title text-5xl md:text-8xl text-white mb-2 leading-none">NEW<br>DROP</h1>
            <p class="text-zinc-400 text-xs uppercase tracking-[0.3em] mb-8 italic font-bold">Coleção Masculina 2026</p>
            
            <div class="flex flex-col gap-4 w-64 mx-auto">
                <a href="https://wa.me/5524992407940" target="_blank" class="btn-premium py-4 px-8 text-[11px] rounded-sm text-center">
                    Ver Catálogo WhatsApp
                </a>
                <a href="#" target="_blank" class="glass-card text-white py-4 px-8 text-[11px] font-bold uppercase tracking-widest rounded-sm text-center">
                    Instagram Oficial
                </a>
            </div>
        </div>

        <div class="text-center">
            <p class="text-white/30 text-[9px] uppercase tracking-[0.5em]">Petrópolis • Rio de Janeiro</p>
        </div>

    </div>

</body>
</html>
