              <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Premium Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-logo { font-family: 'Archivo Black', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Logo = () => (
            <div className="flex flex-col items-center">
                <img src="https://i.ibb.co/m5Z4Xf8Q/115323.png" alt="MP MODAS LOGO" className="w-16 h-16 object-contain" />
                <span className="font-logo text-xs tracking-[0.2em] mt-1 text-black">MP MODAS</span>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940?text=Olá%20MP%20Modas!%20Vi%20o%20catálogo%20e%20tenho%20interesse.";
            
            const products = [
                { name: "Camisa Flamengo 24/25 - Home", price: "R$ 139,90", tag: "Campeão", image: "https://images.unsplash.com/photo-1620311210427-046645398695?w=800" },
                { name: "Camisa São Paulo 24 - New Balance", price: "R$ 149,90", tag: "Tricolor", image: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800" },
                { name: "Nike Dunk Low Panda", price: "R$ 329,90", tag: "Hype", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=800" },
                { name: "Camisa Palmeiras - Puma Gold", price: "R$ 139,90", tag: "Exclusiva", image: "https://images.unsplash.com/photo-1551958219-acbc608c6377?w=800" },
                { name: "Nike Air Jordan 1 High", price: "R$ 389,90", tag: "Lenda", image: "https://images.unsplash.com/photo-1584000302558-ce0ba46d23f7?w=800" },
                { name: "Camisa Corinthians 24 - Black", price: "R$ 139,90", tag: "Fiel", image: "https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=800" },
                { name: "Oakley Flak 1.0 - White", price: "R$ 249,90", tag: "Street", image: "https://images.unsplash.com/photo-1605348532760-6753d2c43329?w=800" },
                { name: "Conjunto Corta-Vento Nike", price: "R$ 199,90", tag: "Inverno", image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=800" },
            ];

            return (
                <div className="bg-white min-h-screen">
                    {/* Header com seu Logo */}
                    <header className="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-zinc-100 py-2">
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <Logo />
                            <a href={whatsapp} target="_blank" className="bg-black text-white px-6 py-2 rounded-full font-bold text-[10px] uppercase tracking-widest hover:scale-105 transition">Comprar</a>
                        </div>
                    </header>

                    {/* Banner Principal */}
                    <section className="pt-40 pb-20 px-6 max-w-7xl mx-auto flex flex-col items-center text-center">
                        <h1 className="text-5xl md:text-8xl font-black uppercase leading-none tracking-tighter mb-4 text-black italic">
                            TEMPORADA<br/><span className="text-zinc-200 uppercase">2026</span>
                        </h1>
                        <p className="text-zinc-500 text-sm md:text-lg mb-8 max-w-lg font-bold">As melhores camisas de time e os tênis mais brabos do RJ.</p>
                        <div className="w-full h-[400px] bg-zinc-100 rounded-lg overflow-hidden relative shadow-2xl border-4 border-black">
                            <img src="https://images.unsplash.com/photo-1511746015097-d770ee397ff2?w=1200" className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                                <p className="text-white font-black text-4xl uppercase tracking-widest border-2 border-white px-6 py-2">MP MODAS</p>
                            </div>
                        </div>
                    </section>

                    {/* Vitrine de Produtos */}
                    <section id="produtos" className="max-w-7xl mx-auto px-6 py-10">
                        <h2 className="text-2xl font-black uppercase mb-10 border-l-8 border-black pl-4">Destaques da Semana</h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
                            {products.map((p, i) => (
                                <div key={i} className="group border border-zinc-100 p-2 rounded-lg shadow-sm hover:shadow-xl transition">
                                    <div className="aspect-square overflow-hidden bg-zinc-100 relative rounded-md mb-4">
                                        <div className="absolute top-2 left-2 z-10 bg-black text-white text-[8px] font-black px-2 py-1 rounded-sm uppercase tracking-tighter">
                                            {p.tag}
                                        </div>
                                        <img src={p.image} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" />
                                    </div>
                                    <h3 className="font-bold text-[11px] md:text-xs uppercase tracking-tight text-zinc-900 line-clamp-1">{p.name}</h3>
                                    <p className="font-black text-sm text-black mb-3 italic underline">{p.price}</p>
                                    <a href={whatsapp} target="_blank" className="block w-full bg-black text-white text-center py-2 text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 rounded">
                                        Pedir Agora
                                    </a>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Rodapé */}
                    <footer className="bg-black text-white mt-20 py-16 px-6 text-center">
                        <div className="mb-6 opacity-80 contrast-200 brightness-200">
                             <img src="https://i.ibb.co/m5Z4Xf8Q/115323.png" alt="MP MODAS LOGO" className="w-16 h-16 mx-auto object-contain grayscale invert" />
                        </div>
                        <p className="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.5em]">MP MODAS - Estilo e Qualidade em Petrópolis</p>
                        <p className="text-zinc-700 text-[9px] mt-4 uppercase">© 2026 Todos os direitos reservados</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
