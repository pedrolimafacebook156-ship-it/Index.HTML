           <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Premium Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-logo { font-family: 'Archivo Black', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Logo = () => (
            <div className="flex flex-col items-center">
                {/* Link direto e estável para o seu logo */}
                <img src="https://raw.githubusercontent.com/pedrolimafacebook156-ship-it/Index.HTML/main/115323.png" alt="MP MODAS LOGO" className="w-16 h-16 object-contain" onError={(e) => {e.target.src="https://via.placeholder.com/150?text=MP+MODAS"}} />
                <span className="font-logo text-xs tracking-[0.2em] mt-1 text-black">MP MODAS</span>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940?text=Olá%20MP%20Modas!";
            
            const products = [
                { name: "Camisa Flamengo 24/25", price: "R$ 139,90", tag: "Campeão", image: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800" },
                { name: "Camisa Brasil Amarela", price: "R$ 149,90", tag: "Elite", image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=800" },
                { name: "Nike Dunk Low Panda", price: "R$ 329,90", tag: "Hype", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=800" },
                { name: "Camisa Real Madrid", price: "R$ 139,90", tag: "Importada", image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=800" },
                { name: "Nike Air Jordan 1", price: "R$ 389,90", tag: "Lenda", image: "https://images.unsplash.com/photo-1584000302558-ce0ba46d23f7?w=800" },
                { name: "Camisa Inter Miami", price: "R$ 149,90", tag: "Top", image: "https://images.unsplash.com/photo-1511746015097-d770ee397ff2?w=800" },
                { name: "Corta Vento Oakley", price: "R$ 249,90", tag: "Street", image: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800" },
                { name: "Tênis Sport Blue", price: "R$ 219,90", tag: "Novo", image: "https://images.unsplash.com/photo-1460353581641-37baddab0fa2?w=800" }
            ];

            return (
                <div className="bg-white min-h-screen">
                    <header className="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-zinc-100 py-2">
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <Logo />
                            <a href={whatsapp} target="_blank" className="bg-black text-white px-6 py-2 rounded-full font-bold text-[10px] uppercase tracking-widest hover:scale-105 transition">Comprar</a>
                        </div>
                    </header>

                    <section className="pt-40 pb-20 px-6 max-w-7xl mx-auto text-center">
                        <h1 className="text-5xl md:text-8xl font-black uppercase leading-none tracking-tighter mb-4 text-black italic">
                            TEMPORADA<br/><span className="text-zinc-200">2026</span>
                        </h1>
                        <p className="text-zinc-500 text-sm md:text-lg mb-8 font-bold italic">As melhores camisas de time e os tênis mais brabos do RJ.</p>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {products.map((p, i) => (
                                <div key={i} className="group border border-zinc-100 p-2 rounded-lg shadow-sm">
                                    <div className="aspect-square overflow-hidden bg-zinc-100 rounded-md mb-4 relative">
                                        <img src={p.image} className="w-full h-full object-cover" />
                                        <div className="absolute top-2 left-2 bg-black text-white text-[8px] font-black px-2 py-1 uppercase">{p.tag}</div>
                                    </div>
                                    <h3 className="font-bold text-[10px] uppercase truncate">{p.name}</h3>
                                    <p className="font-black text-sm text-black mb-3 underline">{p.price}</p>
                                    <a href={whatsapp} target="_blank" className="block w-full bg-black text-white text-center py-2 text-[10px] font-black uppercase rounded">WhatsApp</a>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="bg-black text-white py-10 text-center uppercase tracking-[0.3em] text-[10px]">
                        <p>© 2026 MP MODAS - QUALIDADE ACIMA DE TUDO</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
