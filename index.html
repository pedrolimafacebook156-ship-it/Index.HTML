<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP_MODAS | Premium Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
        
        /* SLIDESHOW DE FUNDO - TÊNIS E CAMISAS MASCULINAS */
        .bg-slideshow {
            position: fixed;
            width: 100vw; height: 100vh;
            z-index: -1;
            filter: brightness(0.35);
        }

        .slide {
            position: absolute;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideAnim 20s infinite;
        }

        /* IMAGENS DE TÊNIS E CAMISAS QUE CARREGAM SEMPRE */
        .slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=1200&q=80'); animation-delay: 0s; } /* Tênis Nike */
        .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=1200&q=80'); animation-delay: 5s; } /* Camisa Masculina */
        .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=1200&q=80'); animation-delay: 10s; } /* Tênis Dunk */
        .slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1618354691792-d1d42acfd860?w=1200&q=80'); animation-delay: 15s; } /* Camisa Black */

        @keyframes slideAnim {
            0% { opacity: 0; transform: scale(1); }
            5% { opacity: 1; }
            25% { opacity: 1; }
            30% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 0; }
        }

        .font-brand { font-family: 'Syncopate', sans-serif; letter-spacing: -2px; }
        
        .btn-glow {
            background: #fff;
            color: #000;
            transition: all 0.3s ease;
            font-weight: 900;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="bg-slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>

    <div class="relative z-10 h-screen flex flex-col items-center justify-between py-16 px-6 text-center">
        
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 bg-white flex items-center justify-center mb-3 shadow-[0_0_40px_rgba(255,255,255,0.4)]">
                <span class="text-black font-black text-2xl tracking-tighter">MP</span>
            </div>
            <p class="text-white text-[9px] tracking-[0.7em] uppercase font-black opacity-50 italic">Petrópolis RJ</p>
        </div>

        <div>
            <h1 class="font-brand text-5xl md:text-8xl text-white mb-2 leading-none uppercase italic">MP_Modas</h1>
            <div class="w-24 h-[2px] bg-white mx-auto mb-8 shadow-[0_0_10px_#fff]"></div>
            <p class="text-zinc-300 text-[10px] uppercase tracking-[0.5em] mb-12 font-bold italic">Tênis • Camisas • Drop 2026</p>
            
            <div class="flex flex-col gap-6 w-80 mx-auto">
                <a href="https://wa.me/5524992407940?text=Olá!%20Vi%20o%20catálogo%20da%20MP_Modas%20e%20gostaria%20de%20ver%20os%20modelos%20de%20Tênis%20e%20Camisas%20disponíveis." 
                   target="_blank" 
                   class="btn-glow py-5 px-8 text-[11px] uppercase tracking-widest text-center">
                    Chamar no WhatsApp
                </a>
                
                <a href="https://www.instagram.com/mp_modas2003/" 
                   target="_blank" 
                   class="glass text-white py-5 px-8 text-[11px] font-black uppercase tracking-widest hover:bg-white hover:text-black transition duration-500">
                    Siga @mp_modas2003
                </a>
            </div>
        </div>

        <div class="space-y-2">
            <p class="text-white/40 text-[8px] uppercase tracking-[0.8em] font-bold italic">Qualidade Premium • Men's Wear</p>
        </div>

    </div>

</body>
</html>
