<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Luxury Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; overflow-x: hidden; }
        .hero-gradient { background: linear-gradient(180deg, #f8f8f8 0%, #ffffff 100%); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Logo = () => (
            <div className="flex flex-col items-center">
                <img src="https://img.freepik.com/premium-vector/initial-letter-mp-logo-design-template_463425-452.jpg?w=200" alt="MP MODAS" className="w-16 h-16 object-contain mix-multiply" />
                <span className="text-[8px] tracking-[0.6em] font-black uppercase mt-1">MP MODAS ATELIER</span>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940";
            
            const drops = [
                { brand: "Jordan Brand", name: "Retro High 'Lost & Found'", img: "https://images.unsplash.com/photo-1597041066858-1320499092d0?w=800" },
                { brand: "Nike Sportswear", name: "Air Max 97 OG 'Silver Bullet'", img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=800" },
                { brand: "Nike Premium", name: "Player Jersey - Night Black", img: "https://images.unsplash.com/photo-1560243563-062bff001d5b?w=800" },
                { brand: "Puma Select", name: "Elite Edition - Gold Trim", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800" },
                { brand: "Nike Air", name: "Air Max 270 'Triple White'", img: "https://images.unsplash.com/photo-1514989940723-e8e51635b782?w=800" },
                { brand: "Jordan Brand", name: "Jordan 4 Retro 'Black Cat'", img: "https://images.unsplash.com/photo-1605405748313-a416a1b84491?w=800" },
                { brand: "Nike Elite", name: "Tech Fleece Jersey Edition", img: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800" },
                { brand: "Adidas Originals", name: "Forum Low 'Core Black'", img: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=800" }
            ];

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-zinc-100 py-6">
                        <div className="max-w-7xl mx-auto px-6 flex justify-center">
                            <Logo />
                        </div>
                    </nav>

                    <header className="pt-48 pb-12 px-6 hero-gradient text-center">
                        <p className="text-[10px] font-bold tracking-[0.4em] text-zinc-400 uppercase mb-4">Limited Availability</p>
                        <h2 className="text-5xl md:text-7xl font-black tracking-tighter uppercase italic leading-none">The Luxury<br/>Drop.</h2>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-20">
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-8">
                            {drops.map((item, i) => (
                                <div key={i} className="group cursor-pointer">
                                    <div className="aspect-square bg-zinc-100 rounded-2xl overflow-hidden mb-4 border border-zinc-50 shadow-sm transition-all group-hover:shadow-xl">
                                        <img src={item.img} alt={item.name} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" />
                                    </div>
                                    <div className="px-2">
                                        <p className="text-[9px] font-black uppercase text-zinc-400 tracking-widest mb-1">{item.brand}</p>
                                        <h3 className="text-[11px] font-bold uppercase tracking-tight text-black mb-4 h-8 leading-tight">{item.name}</h3>
                                        <a href={whatsapp} target="_blank" className="block text-center border-2 border-black py-2 rounded-lg text-[9px] font-black uppercase tracking-widest hover:bg-black hover:text-white transition duration-300">
                                            Consultar
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="bg-black text-white py-20 px-6 text-center mt-20">
                        <div className="opacity-50 grayscale invert brightness-200 mb-8 flex justify-center">
                            <img src="https://img.freepik.com/premium-vector/initial-letter-mp-logo-design-template_463425-452.jpg?w=100" className="w-12 h-12" />
                        </div>
                        <p className="text-[10px] font-bold tracking-[0.5em] mb-4 uppercase">MP MODAS ATELIER • PETRÓPOLIS</p>
                        <p className="text-zinc-600 text-[9px]">© 2026 WORLDWIDE SHIPPING</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
