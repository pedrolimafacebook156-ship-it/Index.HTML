<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Premium Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; }
        .product-card img { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Logo = () => (
            <div className="flex flex-col items-center py-6">
                <img src="115323.png" alt="MP MODAS" className="w-24 h-24 object-contain mb-2" />
                <h1 className="text-[10px] tracking-[0.6em] font-light uppercase border-t border-black pt-2">MP MODAS PREMIUM</h1>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940";
            
            const inventory = [
                { brand: "Nike Performance", model: "Jersey Player Edition White", cat: "Premium Wear", img: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800" },
                { brand: "Puma Select", model: "Jersey Limited Gold Series", cat: "Premium Wear", img: "https://images.unsplash.com/photo-1551958219-acbc608c6377?w=800" },
                { brand: "Jordan Brand", model: "Air Jordan 1 High 'Chicago'", cat: "Footwear", img: "https://images.unsplash.com/photo-1584000302558-ce0ba46d23f7?w=800" },
                { brand: "Nike Sportswear", model: "Air Max 97 Silver Bullet", cat: "Footwear", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800" },
                { brand: "Nike Elite", model: "Jersey Player Edition Black", cat: "Premium Wear", img: "https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=800" },
                { brand: "Adidas Originals", model: "Forum Low Exhibit", cat: "Footwear", img: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=800" },
                { brand: "Nike Air", model: "Air Max Pulse Drift", cat: "Footwear", img: "https://images.unsplash.com/photo-1605348532760-6753d2c43329?w=800" },
                { brand: "Jordan Brand", model: "Jordan 4 Retro Military Blue", cat: "Footwear", img: "https://images.unsplash.com/photo-1597041066858-1320499092d0?w=800" }
            ];

            return (
                <div className="min-h-screen selection:bg-black selection:text-white">
                    <nav className="fixed top-0 w-full bg-white/80 backdrop-blur-xl z-50 border-b border-zinc-100">
                        <div className="max-w-screen-xl mx-auto px-6 h-32 flex flex-col justify-center items-center">
                            <Logo />
                        </div>
                    </nav>

                    <main className="pt-48 pb-20 px-6 max-w-screen-xl mx-auto">
                        <div className="mb-20 text-center">
                            <span className="text-[9px] uppercase tracking-[0.4em] text-zinc-400 font-bold mb-4 block">Spring / Summer 26</span>
                            <h2 className="text-4xl md:text-6xl font-light tracking-tighter uppercase italic text-zinc-900">The New Standard.</h2>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-16">
                            {inventory.map((item, idx) => (
                                <div key={idx} className="product-card group cursor-pointer flex flex-col">
                                    <div className="aspect-[3/4] bg-[#f7f7f7] overflow-hidden rounded-sm mb-6 relative">
                                        <div className="absolute top-4 left-4 z-10">
                                            <span className="bg-white text-black text-[8px] font-bold px-3 py-1 uppercase tracking-widest">{item.cat}</span>
                                        </div>
                                        <img src={item.img} className="w-full h-full object-cover" />
                                    </div>
                                    <div className="flex-grow">
                                        <p className="text-[10px] uppercase tracking-widest text-zinc-400 mb-1 font-bold">{item.brand}</p>
                                        <h3 className="text-sm uppercase font-bold tracking-tight mb-4 text-zinc-800">{item.model}</h3>
                                        <a href={whatsapp} target="_blank" className="inline-block text-[9px] font-black uppercase tracking-[0.3em] border-b-2 border-black pb-1 hover:text-zinc-500 hover:border-zinc-300 transition-all">
                                            Consultar Disponibilidade
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="py-20 border-t border-zinc-100">
                        <div className="max-w-screen-xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-10">
                            <div className="text-center md:text-left">
                                <p className="text-[10px] font-black tracking-[0.5em] uppercase mb-2">MP MODAS ATELIER</p>
                                <p className="text-zinc-400 text-[9px] uppercase tracking-widest">Petrópolis, Rio de Janeiro • Brasil</p>
                            </div>
                            <div className="flex gap-8">
                                <a href={whatsapp} className="text-zinc-400 hover:text-black transition uppercase text-[9px] font-bold tracking-widest">Suporte</a>
                                <a href="#" className="text-zinc-400 hover:text-black transition uppercase text-[9px] font-bold tracking-widest">Envios</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
