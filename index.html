<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP_Modas | Luxury Lookbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
        
        /* VÍDEO DE FUNDO ESTILO LOOKBOOK MASCULINO */
        .video-background {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -100;
            filter: brightness(0.35) contrast(1.1);
            object-fit: cover;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .font-brand { font-family: 'Syncopate', sans-serif; letter-spacing: -1.5px; }
        
        .btn-main {
            background: #fff;
            color: #000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-main:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.2);
        }

        .glow-text {
            text-shadow: 0 0 25px rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-background">
        <source src="https://cdn.pixabay.com/video/2022/01/17/103981-667793393_tiny.mp4" type="video/mp4">
    </video>

    <div class="relative z-10 h-screen flex flex-col items-center justify-between py-16 px-6 text-center">
        
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 bg-white flex items-center justify-center mb-4 rotate-3 shadow-[0_0_35px_rgba(255,255,255,0.4)]">
                <span class="text-black font-black text-2xl tracking-tighter">MP</span>
            </div>
            <h2 class="text-white text-[9px] tracking-[0.6em] font-black uppercase opacity-60">Elite Streetwear</h2>
        </div>

        <div>
            <h1 class="font-brand text-4xl md:text-7xl text-white mb-2 leading-none glow-text uppercase">MP_Modas</h1>
            <div class="w-16 h-1 bg-white mx-auto mb-10"></div>
            <p class="text-zinc-300 text-xs uppercase tracking-[0.4em] mb-12 font-medium">Men's Lookbook • 2026 Collection</p>
            
            <div class="flex flex-col gap-6 w-80 mx-auto">
                <a href="https://wa.me/5524992407940" target="_blank" class="btn-main py-5 px-8 text-[10px] rounded-none">
                    Chamar no WhatsApp
                </a>
                <a href="https://instagram.com/mp_modas" target="_blank" class="glass-effect text-white py-5 px-8 text-[10px] font-black uppercase tracking-[0.3em] rounded-none hover:bg-white hover:text-black transition duration-500">
                    Instagram Oficial
                </a>
            </div>
        </div>

        <div class="space-y-2">
            <p class="text-white/40 text-[8px] uppercase tracking-[0.6em] font-bold">Premium Boutique • Tênis | Moletons | Camisas</p>
            <p class="text-white/20 text-[7px] uppercase tracking-[0.2em]">Petrópolis, Rio de Janeiro</p>
        </div>

    </div>

</body>
</html>
