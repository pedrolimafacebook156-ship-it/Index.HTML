<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | New Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Logo = ({ light = false }) => (
            <div className="flex items-center gap-3 group">
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" stroke={light ? "white" : "black"} strokeWidth="4"/>
                    <path d="M25 65V35L40 50L55 35V65" stroke={light ? "white" : "black"} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M65 35H75C80 35 83 38 83 42.5C83 47 80 50 75 50H65V65" stroke={light ? "white" : "black"} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <div className="flex flex-col text-left">
                    <span className={`text-xl font-black tracking-tighter leading-none ${light ? "text-white" : "text-black"}`}>MP MODAS</span>
                    <span className={`text-[9px] uppercase tracking-[0.3em] ${light ? "text-zinc-500" : "text-zinc-400"}`}>Premium Wear</span>
                </div>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940?text=Olá%20MP%20Modas!%20Quero%20fazer%20um%20pedido.";
            
            const products = [
                { name: "Camisa Flamengo 24/25", price: "R$ 149,90", tag: "Novo", image: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?auto=format&fit=crop&w=800&q=80" },
                { name: "Tênis Nike Jordan Red", price: "R$ 349,90", tag: "Fogo", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=800&q=80" },
                { name: "Seleção Brasil Amarela", price: "R$ 159,90", tag: "Elite", image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=800&q=80" },
                { name: "Corta Vento Oakley", price: "R$ 199,90", tag: "Inverno", image: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&w=800&q=80" },
                { name: "Camisa Real Madrid Blue", price: "R$ 169,90", tag: "Importada", image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=800&q=80" },
                { name: "Tênis Casual Classic", price: "R$ 259,90", tag: "Top", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=800&q=80" },
                { name: "Conjunto Moletom Tech", price: "R$ 289,90", tag: "Promo", image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=800&q=80" },
                { name: "Boné New Era Premium", price: "R$ 89,90", tag: "Style", image: "https://images.unsplash.com/photo-1588850567047-1845a9eecec3?auto=format&fit=crop&w=800&q=80" },
                { name: "Camisa Inter Miami", price: "R$ 149,90", tag: "Messi", image: "https://images.unsplash.com/photo-1511746015097-d770ee397ff2?auto=format&fit=crop&w=800&q=80" },
                { name: "Tênis Sport Blue", price: "R$ 219,90", tag: "Novo", image: "https://images.unsplash.com/photo-1460353581641-37baddab0fa2?auto=format&fit=crop&w=800&q=80" },
                { name: "Calça Cargo Premium", price: "R$ 179,90", tag: "Tendência", image: "https://images.unsplash.com/photo-1624372333417-640348db4956?auto=format&fit=crop&w=800&q=80" },
                { name: "Relógio Digital Sport", price: "R$ 129,90", tag: "Luxo", image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=800&q=80" }
            ];

            return (
                <div className="bg-white min-h-screen">
                    <header className="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-zinc-100 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
                            <Logo />
                            <a href={whatsapp} target="_blank" className="bg-black text-white px-5 py-2 rounded-full font-bold text-xs uppercase tracking-widest hover:scale-105 transition active:scale-95">WhatsApp</a>

                    </header>

                    <section className="pt-40 pb-20 px-6 max-w-7xl mx-auto text-left">
                        <div className="grid md:grid-cols-2 gap-12 items-center">

                            <span className="text-zinc-400 text-xs font-bold uppercase tracking-[0.3em] mb-1">/ {products.length} Itens</span>
                        </div>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-12">
                            {products.map((p, i) => (
                                <div key={i} className="group flex flex-col h-full">
                                    <div className="aspect-[3/4] overflow-hidden bg-zinc-50 mb-5 relative rounded-sm">
                                        <div className="absolute top-3 left-3 z-10 bg-white px-2 py-1 text-[9px] font-black uppercase tracking-widest border border-zinc-100 shadow-sm">{p.tag}</div>
                                        <img src={p.image} className="w-full h-full object-cover group-hover:scale-110 transition duration-700 ease-in-out" />
                                        <div className="absolute inset-0 bg-black/5 group-hover:bg-transparent transition duration-300"></div>
                                    </div>
                                    <div className="flex flex-col flex-grow">
                                        <h3 className="font-bold uppercase text-[11px] tracking-wider text-zinc-800 mb-1">{p.name}</h3>
                                        <p className="font-black text-base text-black mb-4">{p.price}</p>
                                        <a href={whatsapp} target="_blank" className="mt-auto block bg-zinc-50 border border-zinc-200 text-center py-3 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-black hover:text-white hover:border-black transition duration-300">

                                    </div>
                                </div>
                            ))}

                    <footer className="bg-black text-white pt-32 pb-12 px-6">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12 text-center md:text-left border-b border-zinc-800 pb-20 mb-12">
                            <Logo light={true} />
                            <div className="flex gap-12">
                                <div>
                                    <p className="text-zinc-500 text-[10px] uppercase font-black tracking-widest mb-4">Contato</p>
                                    <p className="text-sm font-bold tracking-tight">(24) 99240-7940</p>
                                </div>
                                <div>
                                    <p className="text-zinc-500 text-[10px] uppercase font-black tracking-widest mb-4">Localização</p>
                                    <p className="text-sm font-bold tracking-tight">Petrópolis, RJ</p>
                                </div>
                            </div>
                        </div>
                        <p className="text-zinc-700 text-[10px] uppercase tracking-[.4em] text-center">© 2026 MP MODAS - QUALIDADE ACIMA DE TUDO</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
