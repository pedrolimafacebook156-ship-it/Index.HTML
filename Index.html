<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP MODAS | Premium Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const Logo = ({ light = false }) => (
            <div className="flex items-center gap-3 group">
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" stroke={light ? "white" : "black"} strokeWidth="4"/>
                    <path d="M25 65V35L40 50L55 35V65" stroke={light ? "white" : "black"} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M65 35H75C80 35 83 38 83 42.5C83 47 80 50 75 50H65V65" stroke={light ? "white" : "black"} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <div className="flex flex-col text-left">
                    <span className={`text-xl font-black tracking-tighter leading-none ${light ? "text-white" : "text-black"}`}>MP MODAS</span>
                    <span className={`text-[9px] uppercase tracking-[0.3em] ${light ? "text-zinc-500" : "text-zinc-400"}`}>Premium Wear</span>
                </div>
            </div>
        );

        function App() {
            const whatsapp = "https://wa.me/5524992407940?text=Olá%20MP%20Modas!%20Quero%20ver%20o%20catálogo.";
            const products = [
                { name: "Camisa Flamengo Premium", price: "R$ 149,90", image: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800" },
                { name: "Seleção Brasil Amarela", price: "R$ 159,90", image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=800" },
                { name: "Tênis Street Urban", price: "R$ 229,90", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800" },
                { name: "Tênis Casual White", price: "R$ 249,90", image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=800" },
                { name: "Camisa Real Madrid", price: "R$ 169,90", image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=800" },
                { name: "Sport Vision Black", price: "R$ 219,90", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=800" }
            ];

            return (
                <div className="bg-white min-h-screen">
                    <header className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-zinc-100 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
                            <Logo />
                            <a href={whatsapp} target="_blank" className="bg-black text-white px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-zinc-800 transition">WhatsApp</a>
                        </div>
                    </header>

                    <section className="pt-40 pb-20 px-6 max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center text-left">
                        <div>
                            <div className="w-12 h-1 bg-black mb-6"></div>
                            <h1 className="text-6xl md:text-8xl font-black uppercase leading-[0.9] tracking-tighter mb-6">ESSENTIAL<br/><span className="text-zinc-300">STREETWEAR</span></h1>
                            <p className="text-zinc-500 text-lg mb-8 max-w-md">O melhor da moda esportiva e urbana. Qualidade premium para quem tem estilo.</p>
                            <a href="#produtos" className="inline-block bg-black text-white px-10 py-4 font-bold uppercase text-xs tracking-[.2em] hover:bg-zinc-800 transition">Ver Coleção</a>
                        </div>
                        <img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=800" className="grayscale rounded-sm shadow-2xl w-full h-[500px] object-cover" />
                    </section>

                    <section id="produtos" className="max-w-7xl mx-auto px-6 py-20">
                        <div className="flex justify-between items-end mb-12 border-b pb-6">
                            <h2 className="text-3xl font-black uppercase tracking-tighter">Drops Selecionados</h2>
                            <span className="text-zinc-400 text-xs font-bold uppercase tracking-widest italic">New Arrival</span>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                            {products.map((p, i) => (
                                <div key={i} className="group cursor-pointer">
                                    <div className="aspect-[3/4] overflow-hidden bg-zinc-100 mb-4">
                                        <img src={p.image} className="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-105 transition duration-500" />
                                    </div>
                                    <div className="flex justify-between items-start">
                                        <h3 className="font-bold uppercase text-xs tracking-wider text-zinc-800">{p.name}</h3>
                                        <p className="font-black text-sm">{p.price}</p>
                                    </div>
                                    <a href={whatsapp} target="_blank" className="mt-4 block border border-zinc-200 text-center py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white hover:border-black transition">Solicitar no WhatsApp</a>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="bg-black text-white py-20 px-6 text-center">
                        <div className="flex justify-center mb-8"><Logo light={true} /></div>
                        <p className="text-zinc-500 text-[10px] uppercase tracking-[.3em]">© 2026 MP MODAS - Petrópolis, RJ</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
